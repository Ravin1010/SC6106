<head></head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<body>
    <div class="container">
        <h2>Deposit Money</h2>
        <input type="text" id="customer_input" placeholder="Enter Depositor Address">
        <input type="text" id="amount_input" placeholder="Enter Amount (ETH)">

        <button class="btn" onclick="deposit()">Deposit</button>
        <button class="btn" onclick="transaction()">View Transaction</button>
        <button class="btn" onclick="withdraw()">Withdraw</button>
        
        <form action="/main" method="post">
            <input type="submit" value="Main">
        </form>
        <p id="view_customer_input"></p>
        <p id="view_amount_input"></p>
        <script src ="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
        <script src="/static/popup.js"></script>
        <script>
            const contractAddress = "0x7fCDF7d260255414B10C46E06EefEe4F0d8ADAdF";
            const contractABI = [
                {
                    "inputs": [],
                    "stateMutability": "nonpayable",
                    "type": "constructor"
                },
                {
                    "anonymous": false,
                    "inputs": [
                        {
                            "indexed": true,
                            "internalType": "address",
                            "name": "user",
                            "type": "address"
                        },
                        {
                            "indexed": false,
                            "internalType": "uint256",
                            "name": "amount",
                            "type": "uint256"
                        }
                    ],
                    "name": "DepositMade",
                    "type": "event"
                },
                {
                    "anonymous": false,
                    "inputs": [
                        {
                            "indexed": true,
                            "internalType": "address",
                            "name": "owner",
                            "type": "address"
                        },
                        {
                            "indexed": false,
                            "internalType": "uint256",
                            "name": "amount",
                            "type": "uint256"
                        }
                    ],
                    "name": "Withdraw",
                    "type": "event"
                },
                {
                    "inputs": [],
                    "name": "amount",
                    "outputs": [
                        {
                            "internalType": "uint256",
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [
                        {
                            "internalType": "address",
                            "name": "",
                            "type": "address"
                        }
                    ],
                    "name": "balances",
                    "outputs": [
                        {
                            "internalType": "uint256",
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "name": "customer",
                    "outputs": [
                        {
                            "internalType": "address",
                            "name": "",
                            "type": "address"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [
                        {
                            "internalType": "address",
                            "name": "customer_add",
                            "type": "address"
                        }
                    ],
                    "name": "deposit_money",
                    "outputs": [],
                    "stateMutability": "payable",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "name": "deposit_view",
                    "outputs": [
                        {
                            "internalType": "address",
                            "name": "",
                            "type": "address"
                        },
                        {
                            "internalType": "uint256",
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "name": "owner",
                    "outputs": [
                        {
                            "internalType": "address",
                            "name": "",
                            "type": "address"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "name": "withdraw",
                    "outputs": [],
                    "stateMutability": "nonpayable",
                    "type": "function"
                }
            ];

        const web3 = new Web3(Web3.givenProvider);
        const contract = new web3.eth.Contract(contractABI, contractAddress);

        async function deposit(){
            const accounts = await web3.eth.requestAccounts();

            const wallet = accounts[0];
            const customerInput = document.getElementById("customer_input").value;
            const amount = document.getElementById("amount_input").value;

            // VALIDATION
            if (customerInput.toLowerCase() !== wallet.toLowerCase()) {
                popup("Depositor address must match your connected wallet");
                return;
            }
            const customer = wallet;

            contract.methods.deposit_money(customer).send({
                from: customer,
                value: web3.utils.toWei(amount, "ether")
            })
            .once("receipt", function(receipt){

                const event = receipt.events.DepositMade;

                const user = event.returnValues.user;
                const amt = web3.utils.fromWei(event.returnValues.amount, "ether");

                popup(
                    "Deposit Event:\n" +
                    "User: " + user + "\n" +
                    "Amount: " + amt + "ETH"
                );

                // LOG TRANSACTION
                fetch("/logTransaction", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        username: sessionStorage.getItem("username"),
                        wallet: user,
                        action: "deposit",
                        amount: amt
                    })
                });
            })
            .on("error", function(error){
                console.error(error);
            });
        }

        async function transaction(){
            const result = await contract.methods.deposit_view().call();

            const amt = web3.utils.fromWei(result[1], "ether");

            document.getElementById("view_customer_input").innerText = "Depositor address is " + result[0];
            document.getElementById("view_amount_input").innerText = "Amount is " + amt + "ETH";
        }

        async function withdraw(){
            const accounts = await web3.eth.requestAccounts();

            contract.methods.withdraw().send({
                from: accounts[0]
            })
            .once("receipt", function(receipt){

                const event = receipt.events.Withdraw;

                const owner = event.returnValues.owner;
                const amt = web3.utils.fromWei(event.returnValues.amount, "ether");

                popup(
                    "Withdraw Event:\n" +
                    "Owner: " + owner + "\n" +
                    "Amount: " + amt + "ETH"
                );

                // LOG TRANSACTION
                fetch("/logTransaction", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        username: sessionStorage.getItem("username"),
                        wallet: owner,
                        action: "withdraw",
                        amount: amt
                    })
                });
            })
            .on("error", function(error){
                console.error(error);
            });
        }
        </script>
    </div>
</body>

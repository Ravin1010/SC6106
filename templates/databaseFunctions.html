<head></head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<body>
    <div class="container">
        <h2>Database Functions</h2>
        <!-- SQL UI BUTTONS -->
        <button class="btn" onclick="viewUser()">View User</button>
        <button class="btn" onclick="deleteUser()">Delete User</button>
        <button class="btn" onclick="viewTransactions()">View User Transaction History</button>

        <p id="result"></p>

        <form action="/main" method="post">
            <input type="submit" value="Main">
        </form>
        <script src ="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
        <script src="/static/popup.js"></script>
        <script>
            const username = sessionStorage.getItem("username");

            async function viewUser(){
                const response = await fetch("/viewUser", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ username: username })
                });

                const data = await response.json();

                if(data.status === "success"){
                    document.getElementById("result").innerText =
                        "Username: " + data.username + "\nWallet: " + data.wallet;
                } else {
                    popup(data.message);
                }
            }

            async function deleteUser(){
                const response = await fetch("/deleteUser", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ username: username })
                });

                const data = await response.json();

                popup(data.message);

                if(data.status === "success"){
                    sessionStorage.removeItem("username");
                    window.location.href = "/";
                }
            }

            async function viewTransactions(){
                const response = await fetch("/viewTransactions", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ username: username })
                });

                const data = await response.json();

                if(data.status === "success"){
                    if(data.transactions.length === 0){
                        document.getElementById("result").innerText = "No transactions found";
                        return;
                    }

                    let output = "Transaction History:\n";

                    data.transactions.forEach(tx => {
                        output += tx.action + " " + tx.amount + "ETH\n";
                    });

                    document.getElementById("result").innerText = output;
                } else {
                    popup(data.message);
                }
            }
        </script>
    </div>
</body>

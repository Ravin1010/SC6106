<head></head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
<body>
    <div class="container">
        <h2>Transfer Money</h2>
        <input type="text" id="payer" placeholder="Enter Payer Address">
        <input type="text" id="payee" placeholder="Enter Payee Address">
        <input type="text" id="amount" placeholder="Enter Amount (ETH)">
        <button class="btn" onclick="transfer()">Transfer</button>
        <button class="btn" onclick="transaction()">View Transaction</button>
        
        <form action="/main" method="post">
            <input type="submit" value="Main">
        </form>
        <p id="view_payer"></p>
        <p id="view_payee"></p>
        <p id="view_amount"></p>
        <script src ="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
        <script src="/static/popup.js"></script>
        <script>
            const contractAddress = "0x0e3a7C82510A63887d89d48Fe77b992A0bB4cdC8";
            const contractABI = [
                {
                    "anonymous": false,
                    "inputs": [
                        {
                            "indexed": true,
                            "internalType": "address",
                            "name": "payer",
                            "type": "address"
                        },
                        {
                            "indexed": true,
                            "internalType": "address",
                            "name": "payee",
                            "type": "address"
                        },
                        {
                            "indexed": false,
                            "internalType": "uint256",
                            "name": "amount",
                            "type": "uint256"
                        }
                    ],
                    "name": "Payment",
                    "type": "event"
                },
                {
                    "inputs": [],
                    "name": "amount",
                    "outputs": [
                        {
                            "internalType": "uint256",
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "name": "check_transaction",
                    "outputs": [
                        {
                            "internalType": "address",
                            "name": "",
                            "type": "address"
                        },
                        {
                            "internalType": "address",
                            "name": "",
                            "type": "address"
                        },
                        {
                            "internalType": "uint256",
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "name": "payee",
                    "outputs": [
                        {
                            "internalType": "address",
                            "name": "",
                            "type": "address"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [],
                    "name": "payer",
                    "outputs": [
                        {
                            "internalType": "address",
                            "name": "",
                            "type": "address"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [
                        {
                            "internalType": "address",
                            "name": "",
                            "type": "address"
                        }
                    ],
                    "name": "sentAmounts",
                    "outputs": [
                        {
                            "internalType": "uint256",
                            "name": "",
                            "type": "uint256"
                        }
                    ],
                    "stateMutability": "view",
                    "type": "function"
                },
                {
                    "inputs": [
                        {
                            "internalType": "address",
                            "name": "payer_add",
                            "type": "address"
                        },
                        {
                            "internalType": "address payable",
                            "name": "payee_add",
                            "type": "address"
                        }
                    ],
                    "name": "weixin",
                    "outputs": [],
                    "stateMutability": "payable",
                    "type": "function"
                }
            ];

        const web3 = new Web3(Web3.givenProvider);
        const contract = new web3.eth.Contract(contractABI, contractAddress);

        async function transfer(){
            const accounts = await web3.eth.requestAccounts();

            const wallet = accounts[0]; // connected wallet
            const payerInput = document.getElementById("payer").value;
            const payee = document.getElementById("payee").value;
            const amount = document.getElementById("amount").value;

            // VALIDATION
            if (payerInput.toLowerCase() !== wallet.toLowerCase()) {
                popup("Payer address must match your connected wallet");
                return;
            }
            const payer = wallet;

            contract.methods.weixin(payer, payee).send({
                from: payer,
                value: web3.utils.toWei(amount, "ether")
            })
            .once("receipt", function(receipt){

                const event = receipt.events.Payment;

                const payerAddr = event.returnValues.payer;
                const payeeAddr = event.returnValues.payee;
                const amt = web3.utils.fromWei(event.returnValues.amount, "ether");

                // Popup with event data
                popup(
                    "Payment Event:\n" +
                    "Payer: " + payerAddr + "\n" +
                    "Payee: " + payeeAddr + "\n" +
                    "Amount: " + amt + "ETH"
                );

                // LOG TRANSACTION
                fetch("/logTransaction", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({
                        username: sessionStorage.getItem("username"),
                        wallet: payerAddr,
                        action: "transfer",
                        amount: amt
                    })
                });
            })
            .on("error", function(error){
                console.error(error);
            });
        }

        async function transaction(){
            const result = await contract.methods.check_transaction().call();

            document.getElementById("view_payer").innerText = "Payer is "+ result[0];
            document.getElementById("view_payee").innerText = "Payee is "+ result[1];
            const amt = web3.utils.fromWei(result[2], "ether");
            document.getElementById("view_amount").innerText = "Amount is " + amt + "ETH";

        }
        </script>
    </div>
</body>
